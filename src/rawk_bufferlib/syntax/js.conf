extensions: js, mjs, cjs, jsx, ts, tsx
comment_line: //
comment_block_open: /*
comment_block_close: */
string_delims: "'`
operators: +-*/=<>!&|^~.,:;()[]{}?
keywords: break case catch class const continue debugger default delete do else export extends false finally for function if import in instanceof let new null of return super switch this throw true try typeof undefined var void while with yield async await static get set public private protected readonly interface type enum implements
