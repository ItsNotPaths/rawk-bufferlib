keywords: import foreign package when where if else for switch in not_in do case break continue fallthrough defer return proc struct union enum bit_set bit_field map dynamic auto_cast cast transmute distinct using context or_else or_return or_break or_continue asm matrix typeid bool b8 b16 b32 b64 int i8 i16 i32 i64 i128 uint u8 u16 u32 u64 u128 uintptr i16le i32le i64le i128le u16le u32le u64le u128le i16be i32be i64be i128be u16be u32be u64be u128be f16 f32 f64 f16le f32le f64le f16be f32be f64be complex32 complex64 complex128 quaternion64 quaternion128 quaternion256 rune string cstring rawptr any byte nil true false

# No def_keywords: Odin declares as `Name :: proc/struct/…` (symbol before the
# keyword), so :def special-cases lkOdin in clshell.nim rather than using the
# keyword-prefix alternation other languages share.
